<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <style>
    :root {
      --pedal-duration: 4s;
    }
    @keyframes pedal-left {
      0%   { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes pedal-right {
      0%   { transform: rotate(180deg); }
      100% { transform: rotate(540deg); }
    }
    @keyframes wheel-spin {
      0%   { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .wheel-rear  { animation: wheel-spin var(--pedal-duration) linear infinite; transform-origin: 60px 155px; }
    .wheel-front { animation: wheel-spin var(--pedal-duration) linear infinite; transform-origin: 140px 155px; }
    .leg-left    { animation: pedal-left var(--pedal-duration) linear infinite; transform-origin: 88px 145px; }
    .leg-right   { animation: pedal-right var(--pedal-duration) linear infinite; transform-origin: 88px 145px; }
  </style>

  <!-- Rear wheel -->
  <g class="wheel-rear">
    <circle cx="60" cy="155" r="22" fill="none" stroke="#1a1a1a" stroke-width="4"/>
    <line x1="60" y1="133" x2="60" y2="177" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="38" y1="155" x2="82" y2="155" stroke="#1a1a1a" stroke-width="2"/>
  </g>

  <!-- Front wheel -->
  <g class="wheel-front">
    <circle cx="140" cy="155" r="22" fill="none" stroke="#1a1a1a" stroke-width="4"/>
    <line x1="140" y1="133" x2="140" y2="177" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="118" y1="155" x2="162" y2="155" stroke="#1a1a1a" stroke-width="2"/>
  </g>

  <!-- Bicycle frame -->
  <!-- Seat tube -->
  <line x1="88" y1="115" x2="88" y2="145" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"/>
  <!-- Top tube -->
  <line x1="88" y1="118" x2="120" y2="115" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"/>
  <!-- Down tube -->
  <line x1="88" y1="145" x2="120" y2="115" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"/>
  <!-- Chain stay -->
  <line x1="88" y1="145" x2="60" y2="155" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
  <!-- Seat stay -->
  <line x1="88" y1="118" x2="60" y2="155" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
  <!-- Fork -->
  <line x1="120" y1="115" x2="140" y2="155" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
  <!-- Handlebars -->
  <line x1="118" y1="108" x2="128" y2="108" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"/>
  <line x1="120" y1="115" x2="120" y2="108" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
  <!-- Seat -->
  <line x1="82" y1="115" x2="94" y2="115" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"/>
  <!-- Crank circle -->
  <circle cx="88" cy="145" r="3" fill="#1a1a1a"/>

  <!-- Left leg -->
  <g class="leg-left">
    <!-- Thigh -->
    <line x1="88" y1="145" x2="80" y2="158" stroke="#1a1a1a" stroke-width="5" stroke-linecap="round"/>
    <!-- Shin -->
    <line x1="80" y1="158" x2="76" y2="170" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Right leg -->
  <g class="leg-right">
    <!-- Thigh -->
    <line x1="88" y1="145" x2="96" y2="158" stroke="#1a1a1a" stroke-width="5" stroke-linecap="round"/>
    <!-- Shin -->
    <line x1="96" y1="158" x2="100" y2="170" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Body (torso) -->
  <line x1="88" y1="115" x2="88" y2="85" stroke="#1a1a1a" stroke-width="5" stroke-linecap="round"/>

  <!-- Arms -->
  <line x1="88" y1="92" x2="120" y2="108" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"/>

  <!-- Head -->
  <circle cx="88" cy="70" r="16" fill="#f0a8b4"/>
</svg>
