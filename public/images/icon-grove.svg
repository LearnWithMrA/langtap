  <!-- Right tree -->
  <line x1="34" y1="6" x2="34" y2="36" stroke="#3d3028" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="24" y1="16" x2="34" y2="11" stroke="#3d3028" stroke-width="2" stroke-linecap="round"/>
