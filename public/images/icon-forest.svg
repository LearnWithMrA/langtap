  <line x1="28" y1="2" x2="28" y2="24" stroke="#3d3028" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="18" y1="12" x2="28" y2="7" stroke="#3d3028" stroke-width="2" stroke-linecap="round"/>
  <line x1="38" y1="12" x2="28" y2="7" stroke="#3d3028" stroke-width="2" stroke-linecap="round"/>
  <line x1="20" y1="24" x2="28" y2="17" stroke="#3d3028" stroke-width="2" stroke-linecap="round"/>
  <line x1="36" y1="24" x2="28" y2="17" stroke="#3d3028" stroke-width="2" stroke-linecap="round"/>
  <!-- Bottom-left tree -->
  <line x1="16" y1="22" x2="16" y2="44" stroke="#3d3028" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="6" y1="32" x2="16" y2="27" stroke="#3d3028" stroke-width="2" stroke-linecap="round"/>
  <line x1="26" y1="32" x2="16" y2="27" stroke="#3d3028" stroke-width="2" stroke-linecap="round"/>
  <line x1="8" y1="44" x2="16" y2="37" stroke="#3d3028" stroke-width="2" stroke-linecap="round"/>
  <line x1="24" y1="44" x2="16" y2="37" stroke="#3d3028" stroke-width="2" stroke-linecap="round"/>
  <!-- Bottom-right tree -->
  <line x1="40" y1="22" x2="40" y2="44" stroke="#3d3028" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="30" y1="32" x2="40" y2="27" stroke="#3d3028" stroke-width="2" stroke-linecap="round"/>
  <line x1="50" y1="32" x2="40" y2="27" stroke="#3d3028" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="44" x2="40" y2="37" stroke="#3d3028" stroke-width="2" stroke-linecap="round"/>
  <line x1="48" y1="44" x2="40" y2="37" stroke="#3d3028" stroke-width="2" stroke-linecap="round"/>
</svg>
